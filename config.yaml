# Trader Bot config

symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - AVAX/USDT
  - ADA/USDT
  - DOGE/USDT
  - LINK/USDT

timeframe: "1h"
scan_interval: 60          # seconds between scans

# Risk management
max_positions: 5           # max simultaneous positions
risk_per_trade: 0.05       # 5% of portfolio per trade
max_daily_loss: 0.05       # halt trading if down 5% in a day

# Stop-loss and take-profit are dynamic (ATR-based):
#   SL = entry - 2x ATR  (adapts to volatility)
#   TP = entry + 4x ATR  (2:1 risk/reward ratio)
#   Trailing stop activates after 2x ATR profit
