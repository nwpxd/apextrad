<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:#18181b;--border:#27272a;
  --text:#fafafa;--dim:#71717a;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;
}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.title{font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.grid>*{background:var(--surface);padding:24px}
.full{grid-column:1/-1}

/* Labels */
.label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:16px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.row+.row{border-top:1px solid var(--border)}
.row-label{font-size:13px;color:var(--dim)}
.row-value{font-size:14px;font-weight:600}

/* Big number */
.big{font-size:36px;font-weight:700;letter-spacing:-1px}
.sub{font-size:14px;font-weight:500;margin-left:8px}

/* Colors */
.up{color:var(--green)}.down{color:var(--red)}.muted{color:var(--dim)}

/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:8px 12px;border-bottom:1px solid var(--border)}
th:not(:first-child){text-align:right}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(39,39,42,.5)}
td:not(:first-child){text-align:right}
td:first-child{font-weight:600;color:#fff}

/* Signal list */
.sig{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.sig+.sig{border-top:1px solid rgba(39,39,42,.5)}
.sig-time{color:var(--dim);min-width:55px;font-variant-numeric:tabular-nums}
.sig-action{padding:2px 8px;border-radius:3px;font-weight:700;font-size:10px;letter-spacing:.5px;min-width:36px;text-align:center}
.sig-action.BUY{background:rgba(34,197,94,.12);color:var(--green)}
.sig-action.SELL{background:rgba(239,68,68,.12);color:var(--red)}
.sig-action.HOLD{background:rgba(113,113,122,.1);color:var(--dim)}
.sig-sym{font-weight:600;min-width:70px}
.sig-score{min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.sig-reason{color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.empty{text-align:center;padding:24px;color:var(--dim);font-style:italic;font-size:13px}

/* Config bar */
.config-bar{display:flex;gap:20px;flex-wrap:wrap}
.config-item{font-size:11px;color:var(--dim)}
.config-item strong{color:var(--text);font-weight:500}

@media(max-width:640px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <span class="title">trader bot</span>
  <div class="status"><span class="dot" id="dot"></span><span id="status-text">connecting</span></div>
</header>

<div class="grid">

  <!-- P&L -->
  <div>
    <div class="label">Portfolio</div>
    <div id="pnl-display">
      <span class="big muted" id="pnl">$0.00</span>
      <span class="sub muted" id="pnl-pct">(0.0%)</span>
    </div>
    <div style="margin-top:16px">
      <div class="row"><span class="row-label">Cash</span><span class="row-value" id="cash">$0</span></div>
      <div class="row"><span class="row-label">Exposure</span><span class="row-value" id="exposure">$0</span></div>
      <div class="row"><span class="row-label">Total</span><span class="row-value" id="total">$0</span></div>
    </div>
  </div>

  <!-- Metrics -->
  <div>
    <div class="label">Metrics</div>
    <div class="row"><span class="row-label">Daily P&L</span><span class="row-value" id="daily">$0</span></div>
    <div class="row"><span class="row-label">Trades today</span><span class="row-value" id="trades-today">0</span></div>
    <div class="row"><span class="row-label">Total trades</span><span class="row-value" id="total-trades">0</span></div>
    <div class="row"><span class="row-label">Win rate</span><span class="row-value" id="winrate">-</span></div>
    <div class="row"><span class="row-label">Avg win</span><span class="row-value up" id="avg-win">-</span></div>
    <div class="row"><span class="row-label">Avg loss</span><span class="row-value down" id="avg-loss">-</span></div>
  </div>

  <!-- Positions -->
  <div class="full">
    <div class="label">Positions <span id="pos-n" style="color:var(--yellow)">0/5</span></div>
    <table>
      <thead><tr><th>Symbol</th><th>Entry</th><th>Current</th><th>Size</th><th>P&L</th><th>%</th></tr></thead>
      <tbody id="pos-body"><tr><td colspan="6" class="empty">No positions</td></tr></tbody>
    </table>
  </div>

  <!-- Signals -->
  <div class="full">
    <div class="label">Signals</div>
    <div id="sig-body"><div class="empty">Waiting for scan...</div></div>
  </div>

  <!-- Config -->
  <div class="full" style="padding:16px 24px">
    <div class="config-bar" id="config-bar"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=2)=>Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const sign=n=>n>=0?'+':'';
const cls=n=>n>=0?'up':'down';
const fmtP=p=>p>1e4?'$'+fmt(p,0):p>100?'$'+fmt(p,1):p>1?'$'+fmt(p,2):p>.01?'$'+p.toFixed(4):'$'+p.toFixed(6);

function update(d){
  const p=d.portfolio,m=d.metrics;

  // PnL
  $('pnl').textContent=sign(p.pnl)+'$'+fmt(Math.abs(p.pnl));
  $('pnl').className='big '+cls(p.pnl);
  $('pnl-pct').textContent='('+sign(p.pnl_pct)+fmt(Math.abs(p.pnl_pct),1)+'%)';
  $('pnl-pct').className='sub '+cls(p.pnl_pct);

  $('cash').textContent='$'+fmt(p.cash);
  $('exposure').textContent='$'+fmt(p.exposure);
  $('total').textContent='$'+fmt(p.value);

  // Metrics
  const dp=m.daily_pnl;
  $('daily').textContent=sign(dp)+'$'+fmt(Math.abs(dp));
  $('daily').className='row-value '+cls(dp);
  $('trades-today').textContent=m.trades_today;
  $('total-trades').textContent=m.total_trades;
  $('winrate').textContent=m.total_trades?m.win_rate.toFixed(1)+'%':'-';
  $('winrate').className='row-value '+(m.win_rate>=50?'up':m.win_rate>0?'down':'');
  $('avg-win').textContent=m.avg_win?'+$'+fmt(m.avg_win):'-';
  $('avg-loss').textContent=m.avg_loss?'-$'+fmt(Math.abs(m.avg_loss)):'-';

  // Positions
  $('pos-n').textContent=d.positions.length+'/'+d.max_positions;
  const tb=$('pos-body');
  if(!d.positions.length){
    tb.innerHTML='<tr><td colspan="6" class="empty">No positions</td></tr>';
  }else{
    tb.innerHTML=d.positions.map(p=>{
      const s=p.symbol.replace('/USDT','');
      const c=cls(p.pnl);
      return`<tr><td>${s}</td><td class="muted">${fmtP(p.entry)}</td><td>${fmtP(p.current)}</td><td class="muted">$${fmt(p.cost,0)}</td><td class="${c}">${sign(p.pnl)}$${fmt(Math.abs(p.pnl))}</td><td class="${c}" style="font-weight:700">${sign(p.pnl_pct)}${fmt(Math.abs(p.pnl_pct),1)}%</td></tr>`;
    }).join('');
  }

  // Signals
  const sb=$('sig-body');
  if(!d.signals||!d.signals.length){
    sb.innerHTML='<div class="empty">Waiting for scan...</div>';
  }else{
    const nonHold=d.signals.filter(s=>s.action!=='HOLD');
    const show=nonHold.length>=3?nonHold.slice(-15):d.signals.slice(-15);
    sb.innerHTML=show.map(s=>{
      const sym=s.symbol.replace('/USDT','');
      const sc=s.score>0.05?'up':s.score<-0.05?'down':'muted';
      const r=s.reason&&s.reason.length>50?s.reason.slice(0,47)+'...':s.reason||'';
      return`<div class="sig"><span class="sig-time">${s.time}</span><span class="sig-action ${s.action}">${s.action}</span><span class="sig-sym">${sym}</span><span class="sig-score ${sc}">${sign(s.score)}${Math.abs(s.score).toFixed(3)}</span><span class="sig-reason">${r}</span></div>`;
    }).join('');
  }

  // Config
  if(d.config){
    const c=d.config;
    $('config-bar').innerHTML=[
      `<span class="config-item">Symbols: <strong>${c.symbols.map(s=>s.replace('/USDT','')).join(' ')}</strong></span>`,
      `<span class="config-item">TF: <strong>${c.timeframe}</strong></span>`,
      `<span class="config-item">SL: <strong>${(c.stop_loss*100).toFixed(0)}%</strong></span>`,
      `<span class="config-item">TP: <strong>${(c.take_profit*100).toFixed(0)}%</strong></span>`,
    ].join('');
  }
}

function connect(){
  const ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>{$('dot').style.background='var(--green)';$('status-text').textContent='live'};
  ws.onmessage=e=>{try{update(JSON.parse(e.data))}catch(err){console.error(err)}};
  ws.onclose=()=>{$('dot').style.background='var(--red)';$('status-text').textContent='reconnecting';setTimeout(connect,3000)};
  ws.onerror=()=>ws.close();
}
connect();
</script>
</body>
</html>
