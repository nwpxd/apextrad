# APEX Trader Configuration
# Override any setting here; env vars take priority for secrets

# Risk Management
max_position_pct: 0.10        # Max 10% of limit per position
stop_loss_pct: 0.03           # 3% stop-loss
take_profit_pct: 0.06         # 6% take-profit
max_open_positions: 12
max_daily_loss_pct: 0.10      # Halt trading if down 10% today
min_liquidity_usd: 10000      # Skip low-liquidity pairs

# Strategy Weights (meta-AI adjusts these dynamically)
momentum_weight: 0.30
mean_reversion_weight: 0.45
sentiment_weight: 0.10
arbitrage_weight: 0.15

# Markets — enable/disable
crypto_enabled: true
stocks_enabled: true
memecoins_enabled: true

# Crypto pairs to watch
crypto_pairs:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - AVAX/USDT
  - BNB/USDT
  - LINK/USDT
  - DOT/USDT

# Memecoin pairs (higher risk, smaller allocations)
memecoin_pairs:
  - DOGE/USDT
  - SHIB/USDT
  - PEPE/USDT
  - WIF/USDT
  - BONK/USDT

# Stock watchlist
stock_watchlist:
  - AAPL
  - NVDA
  - TSLA
  - META
  - MSFT
  - AMD
  - GOOGL
  - AMZN

# Timing
scan_interval_sec: 15         # Scan markets every 15 seconds
sentiment_interval_sec: 300   # Refresh sentiment every 5 minutes
rebalance_interval_sec: 60    # Check stop/TP every 60 seconds
