# Trader Bot config

symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - AVAX/USDT

timeframe: "1h"
scan_interval: 60        # seconds between scans

# Risk
max_positions: 5
risk_per_trade: 0.05     # 5% of portfolio per trade
stop_loss: 0.02          # 2% stop-loss
take_profit: 0.04        # 4% take-profit (2:1 R/R)
max_daily_loss: 0.05     # halt if down 5% in a day
